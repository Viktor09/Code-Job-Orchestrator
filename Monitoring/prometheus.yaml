scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jobapi'
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['jobapi:5000']
  - job_name: 'kong'
    metrics_path: /metrics
    static_configs:
      - targets: ['kong:8001']