services:
  frontend:
    image: vick09/code-job-orchestrator:frontend
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - shared_jobs_data:/shared/jobs
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - public_network

  auth:
    image: vick09/code-job-orchestrator:auth
    env_file:
      - .env
    depends_on:
      - postgres
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - public_network
      - private_network

  persistence:
    image: vick09/code-job-orchestrator:persistence
    env_file:
      - .env
    depends_on:
      - postgres
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - private_network
      - database_network
  
  jobapi:
    image: vick09/code-job-orchestrator:api
    env_file:
      - .env
    depends_on:
      - persistence
      - redis
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - public_network
      - private_network
      - database_network

  worker:
    image: vick09/code-job-orchestrator:worker
    env_file:
      - .env
    depends_on:
      - persistence
      - redis
    volumes:
      - shared_jobs_data:/shared/jobs
    networks:
      - private_network
      - database_network
  
  redis:
    image: redis:7
    networks:
      - private_network

  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.json
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./Kong/kong.json:/usr/local/kong/declarative/kong.json:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - frontend
      - auth
      - jobapi
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - public_network

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      mode: global
      placement:
        constraints: [node.role == manager]
    networks:
      - public_network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./Monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - public_network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./Monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./Monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - public_network

  postgres:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - private_network
      - database_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    ports:
      - "5050:80"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - private_network

networks:
  public_network:
    driver: overlay
    attachable: true
  private_network:
    driver: overlay
    internal: true
  database_network:
    driver: overlay
    internal: true

volumes:
  portainer_data:
    driver: local
  postgres_data:
    driver: local
  shared_jobs_data:
    driver: local
  grafana_data:
    driver: local