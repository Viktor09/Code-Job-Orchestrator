version: '3.8'

services:
  frontend:
    image: frontend_app:latest
    ports:
      - "5000:5000"
    networks:
      - frontend_network
    deploy:
      replicas: 1

  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.json
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./Frontend/kong.json:/usr/local/kong/declarative/kong.json
    ports:
      - "8000:8000"
    networks:
      - frontend_network
    deploy:
      replicas: 1

  portainer:
    image: portainer/portainer-ce:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"
    networks:
      - frontend_network
    deploy:
      placement:
        constraints:
          - node.role == manager

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./Monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"
    networks:
      - monitoring_network
    deploy:
      replicas: 1

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - monitoring_network
    deploy:
      replicas: 1

networks:
  frontend_network:
    driver: overlay
  monitoring_network:
    driver: overlay
  

volumes:
  portainer_data: