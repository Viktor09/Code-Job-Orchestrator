services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: frontend_app:latest
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - shared_jobs_data:/shared/jobs
    networks:
      - frontend_network

  auth:
    build:
      context: ./Authentication
      dockerfile: Dockerfile
    image: auth_service:latest
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - frontend_network

  persistence:
    build:
      context: ./PersistenceService
      dockerfile: Dockerfile
    image: persistence_service:latest
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - frontend_network
  
  jobapi:
    build:
      context: ./JobAPIService
      dockerfile: Dockerfile
    image: job_api_service:latest
    env_file:
      - .env
    depends_on:
      - persistence
      - redis
    networks:
      - frontend_network

  worker:
    build:
      context: ./WorkerService
      dockerfile: Dockerfile
    image: worker_service:latest
    env_file:
      - .env
    depends_on:
      - persistence
      - redis
    volumes:
      - shared_jobs_data:/shared/jobs
    networks:
      - frontend_network
  
  redis:
    image: redis:7
    networks:
      - frontend_network

  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.json
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./Kong/kong.json:/usr/local/kong/declarative/kong.json:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - frontend
      - auth
      - jobapi
    networks:
      - frontend_network

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - portainer_data:/data
    networks:
      - frontend_network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./Monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - frontend_network
      - monitoring_network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_network

  postgres:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    ports:
      - "5050:80"
    networks:
      - frontend_network

networks:
  frontend_network:
    driver: overlay
  monitoring_network:
    driver: overlay

volumes:
  portainer_data:
  postgres_data:
  shared_jobs_data:
  grafana_data: