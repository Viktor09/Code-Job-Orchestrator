<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Code Job Orchestrator - Login</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	<div class="container">
		<div class="card auth-card">
			<h2 class="auth-title">Login</h2>

			<form method="post" action="{{ url_for('login') }}">
				<div class="form-group">
					<label for="user_email">Email</label>
					<input type="email" id="user_email" name="user_email" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" required>
				</div>

				<button type="submit" class="btn-submit">Sign in</button>
			</form>
			{% if message %}
			<div class="auth-feedback auth-feedback-success">{{ message }}</div>
			{% endif %}

			{% if error %}
			<div class="auth-feedback auth-feedback-error">{{ error }}</div>
			{% endif %}

			<p class="auth-switch">
				No account?
				<a href="{{ url_for('register') }}" class="auth-link">Register here</a>
			</p>
		</div>
	</div>
</body>
</html>
