<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Code Job Orchestrator - Register</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	<div class="container">
		<div class="card auth-card">
			<h2 class="auth-title">Register</h2>
			<form method="post" action="{{ url_for('register') }}">
				<div class="form-group">
					<label for="user_name">Username</label>
					<input type="text" id="user_name" name="user_name" value="{{ form_data.user_name }}" required>
				</div>

				<div class="form-group">
					<label for="user_email">Email</label>
					<input type="email" id="user_email" name="user_email" value="{{ form_data.user_email }}" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" required>
				</div>

				<button type="submit" class="btn-submit">Create account</button>
			</form>
			{% if error %}
			<div class="auth-feedback auth-feedback-error">{{ error }}</div>
			{% endif %}

			<p class="auth-switch">
				Already have an account?
				<a href="{{ url_for('login') }}" class="auth-link">Sign in</a>
			</p>
		</div>
	</div>
</body>
</html>
