name: CI/CD Code Job Orchestrator

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: |
          docker build -t vick09/code-job-orchestrator:frontend ./Frontend
          docker build -t vick09/code-job-orchestrator:auth ./Authentication
          docker build -t vick09/code-job-orchestrator:persistence ./PersistenceService
          docker build -t vick09/code-job-orchestrator:api ./JobAPIService
          docker build -t vick09/code-job-orchestrator:worker ./WorkerService

          docker push vick09/code-job-orchestrator:frontend
          docker push vick09/code-job-orchestrator:auth
          docker push vick09/code-job-orchestrator:persistence
          docker push vick09/code-job-orchestrator:api
          docker push vick09/code-job-orchestrator:worker

  pull-and-deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull vick09/code-job-orchestrator:frontend
          docker pull vick09/code-job-orchestrator:auth
          docker pull vick09/code-job-orchestrator:persistence
          docker pull vick09/code-job-orchestrator:api
          docker pull vick09/code-job-orchestrator:worker

      - name: Deploy stack
        run: docker stack deploy -c compose.yaml code_job_orchestrator --with-registry-auth